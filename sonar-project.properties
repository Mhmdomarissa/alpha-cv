# SonarQube Project Configuration
# This is the root configuration file for the entire project

# Project identification
sonar.projectKey=alpha-cv
sonar.projectName=Alpha CV Analyzer
sonar.projectVersion=2.0.0

# Source code encoding
sonar.sourceEncoding=UTF-8

# Exclude patterns
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/venv/**,**/__pycache__/**,**/*.pyc,**/.pytest_cache/**,**/coverage/**,**/.coverage/**,**/htmlcov/**,**/uploads/**,**/tmp/**,**/temp/**,**/*.log,**/.git/**,**/docker-compose*.yml,**/Dockerfile*,**/*.md,**/*.sh,**/requirements.txt,**/package*.json,**/tsconfig.json,**/next.config.*

# Test exclusions
sonar.test.exclusions=**/test/**,**/tests/**,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*_test.py,**/test_*.py

# Coverage exclusions
sonar.coverage.exclusions=**/test/**,**/tests/**,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*_test.py,**/test_*.py,**/migrations/**,**/__init__.py

# Language-specific settings
sonar.python.version=3.12
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Security hotspot settings
sonar.security.hotspots.enabled=true

# Code duplication
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/*_test.py,**/test_*.py

# Issue exclusions (false positives)
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S107
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S107
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.ts
sonar.issue.ignore.multicriteria.e3.ruleKey=javascript:S107
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.js
