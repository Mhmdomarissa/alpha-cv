version: '3.8'

services:
  # Development Frontend (runs on port 3000)
  frontend-dev:
    build:
      context: ./cv-analyzer-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"  # Standard port
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://127.0.0.1:8000
    depends_on:
      - backend-dev
    networks:
      - dev-network
    restart: unless-stopped

  # Development Backend (runs on port 8000)
  backend-dev:
    build:
      context: ./alpha-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"  # Standard port
    env_file:
      - .env.dev
    environment:
      - UVICORN_WORKERS=1  # Single worker for development
    volumes:
      - ./alpha-backend:/app
    networks:
      - dev-network
    depends_on:
      - postgres-dev
      - qdrant-dev
      - redis-dev
    restart: unless-stopped

  # Development PostgreSQL (runs on port 5434)
  postgres-dev:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cv_analyzer_dev
    ports:
      - "5434:5432"  # Different port for dev
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    networks:
      - dev-network
    restart: unless-stopped

  # Development Qdrant (runs on port 6335)
  qdrant-dev:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"  # Different port for dev
    volumes:
      - qdrant-dev-data:/qdrant/storage
    networks:
      - dev-network
    restart: unless-stopped

  # Development Redis (runs on port 6380)
  redis-dev:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # Different port for dev
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - dev-network
    restart: unless-stopped

  # SonarQube Server (Code Quality & Security Analysis)
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube-dev
    depends_on:
      - sonarqube-db
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonar
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"  # SonarQube web interface
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9000/api/system/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # SonarQube Database (PostgreSQL)
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-db-dev
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonar
    volumes:
      - sonarqube-db-data:/var/lib/postgresql/data
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dev-network:
    driver: bridge

volumes:
  postgres-dev-data:
  qdrant-dev-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  sonarqube-db-data: