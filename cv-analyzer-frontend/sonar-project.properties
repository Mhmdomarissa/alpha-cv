# SonarQube Configuration for TypeScript/JavaScript Frontend
sonar.projectKey=alpha-cv-frontend
sonar.projectName=Alpha CV Analyzer - Frontend (Next.js/TypeScript)
sonar.projectVersion=2.0.0

# Source code
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Language
sonar.language=ts,js

# TypeScript/JavaScript settings
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/out/**,**/coverage/**,**/.git/**,**/public/**,**/*.config.*,**/package*.json,**/tsconfig.json,**/next.config.*,**/*.d.ts,**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx

# Test exclusions
sonar.test.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/test/**,**/tests/**

# Coverage
sonar.coverage.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/test/**,**/tests/**,**/node_modules/**,**/.next/**,**/out/**,**/*.config.*,**/public/**

# Code duplication
sonar.cpd.exclusions=**/__tests__/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/test/**,**/tests/**,**/node_modules/**,**/.next/**,**/out/**

# Security hotspot settings
sonar.security.hotspots.enabled=true

# Issue exclusions (common false positives)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5
# Too many parameters (acceptable for React components)
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S107
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.tsx
# Too many return statements (acceptable for complex components)
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S1142
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.tsx
# Cognitive complexity (acceptable for business logic)
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.ts
# Use of any type (acceptable in some cases)
sonar.issue.ignore.multicriteria.e4.ruleKey=typescript:S1313
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.ts
# Console statements (acceptable for logging)
sonar.issue.ignore.multicriteria.e5.ruleKey=typescript:S2228
sonar.issue.ignore.multicriteria.e5.resourceKey=**/*.ts
