# Dev nginx - same routing as prod, upstreams = frontend-dev / backend-dev
# No IP/UA blocking so local tools (curl, Postman) work.
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 300;
  client_max_body_size 25m;

  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=addr:10m;
  limit_conn addr 20;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream frontend { server frontend-dev:3000; }
  upstream backend  { server backend-dev:8000; }

  server {
    listen 80;
    server_name localhost 127.0.0.1;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location = /api {
      return 301 /api/;
    }

    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 1800s;
      proxy_send_timeout 1800s;
      proxy_connect_timeout 60s;
      proxy_request_buffering off;
      proxy_buffering off;
      client_max_body_size 25m;
      proxy_max_temp_file_size 0;
    }

    location = /health {
      proxy_pass http://backend/api/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /docs {
      proxy_pass http://backend/docs;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /redoc {
      proxy_pass http://backend/redoc;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      expires 1y;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options "nosniff";
    }

    location / {
      limit_req zone=general burst=100 nodelay;
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 1200s;
      proxy_send_timeout 1200s;
      proxy_connect_timeout 60s;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      add_header Pragma "no-cache";
      add_header Expires "0";
    }
  }
}
