# =============================================================================
# Production - CPU-only (no GPU)
# Alternative to g4dn.xlarge. Use on m6i.2xlarge / t3.2xlarge for ~20 users.
# Run: docker compose -f docker-compose.cpu.yml up -d
# =============================================================================
version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # Backend (FastAPI) - CPU-only, tuned for ~20 users
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./alpha-backend
      args:
        TORCH_GPU: "0"
    env_file:
      - ./.env
      - ./security_hardening.env
    environment:
      NODE_ENV: "production"
      ENVIRONMENT: "production"
      QDRANT_MAX_CONNECTIONS: "400"
      QDRANT_POOL_SIZE: "200"
      QDRANT_TIMEOUT: "120"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_MAXMEMORY: "8gb"
      REDIS_MAXMEMORY_POLICY: "allkeys-lru"
      MAX_GLOBAL_CONCURRENT: "800"
      CIRCUIT_BREAKER_THRESHOLD: "200"
      CIRCUIT_BREAKER_RECOVERY_TIME: "300"
      MIN_QUEUE_WORKERS: "4"
      MAX_QUEUE_WORKERS: "10"
      QUEUE_SIZE_THRESHOLD: "5000"
      MEMORY_THRESHOLD_MB: "8192"
      CPU_THRESHOLD_PERCENT: "90"
      PYTHON_MEMORY_LIMIT: "8192"
      UVICORN_WORKERS: "4"
      WORKER_CONNECTIONS: "2048"
      KEEPALIVE_TIMEOUT: "65"
      CLIENT_MAX_BODY_SIZE: "200M"
      ENABLE_GPU_BATCH_PROCESSING: "false"
      ENABLE_AGGRESSIVE_CACHING: "true"
      CACHE_TTL_EMBEDDINGS: "86400"
      CACHE_TTL_MATCHES: "3600"
      ASYNC_WORKER_POOL_SIZE: "12"
      ENABLE_PERFORMANCE_MONITORING: "true"
      LOG_LEVEL: "INFO"
      ENABLE_REQUEST_LOGGING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./alpha-backend:/app
    networks:
      - cv-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, json, sys; resp=urllib.request.urlopen('http://localhost:8000/api/health', timeout=5); data=json.loads(resp.read().decode()); sys.exit(0 if data.get('status') in ('healthy','degraded') else 1)"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'

  frontend:
    build:
      context: ./cv-analyzer-frontend
      dockerfile: Dockerfile
    extra_hosts:
      - "89.144.31.18:127.0.0.1"
      - "176.117.107.158:127.0.0.1"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
    env_file:
      - ./.env
    environment:
      NEXT_PUBLIC_API_URL: "https://alphacv.alphadatarecruitment.ae"
      NEXT_PUBLIC_API_BASE: "https://alphacv.alphadatarecruitment.ae"
      BACKEND_URL: "http://backend:8000"
      NODE_ENV: "production"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cv-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cv_database
      POSTGRES_USER: cv_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      POSTGRES_MULTIPLE_DATABASES: "auth_db"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-optimized.conf:/etc/postgresql/postgresql.conf:ro
    restart: unless-stopped
    networks:
      - cv-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '1.5'
        reservations:
          memory: 1.5G
          cpus: '1.0'
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=2GB
      -c maintenance_work_mem=256MB
      -c max_connections=100
      -c work_mem=32MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=32MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_wal_size=4GB
      -c min_wal_size=1GB
      -c checkpoint_timeout=15min
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c huge_pages=off
      -c min_wal_size=512MB
      -c max_wal_size=2GB

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant-optimized.yaml:/qdrant/config/production.yaml:ro
    restart: unless-stopped
    networks:
      - cv-network
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_REQUESTS: 2000
      QDRANT__STORAGE__PERFORMANCE__MAX_OPTIMIZATION_THREADS: 16
      QDRANT__SERVICE__MAX_REQUEST_SIZE_MB: 512
      QDRANT__STORAGE__WAL__WAL_CAPACITY_MB: 256
      QDRANT__STORAGE__PERFORMANCE__MAX_PAYLOAD_SIZE_MB: 128
      QDRANT__STORAGE__PERFORMANCE__MAX_VECTOR_SIZE: 4096
      QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_RESULTS: 10000
      QDRANT__STORAGE__PERFORMANCE__MAX_POINTS_PER_SEARCH: 10000
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.0'
        reservations:
          memory: 3G
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 6gb --maxmemory-policy allkeys-lru --tcp-keepalive 60 --timeout 300 --maxclients 800
    restart: unless-stopped
    networks:
      - cv-network
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '1.5'
        reservations:
          memory: 3G
          cpus: '0.5'

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-cache:/var/cache/nginx
      - ./maintenance.html:/usr/share/nginx/html/maintenance.html:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - cv-network
    environment:
      - DOMAIN=alphacv.alphadatarecruitment.ae
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - cv-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=48h'
      - '--storage.tsdb.retention.size=512MB'
      - '--web.enable-lifecycle'
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'

  redis-exporter:
    image: oliver006/redis_exporter:latest
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=""
    restart: unless-stopped
    networks:
      - cv-network
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 32M
          cpus: '0.05'

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  nginx-cache:
    driver: local

networks:
  cv-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
