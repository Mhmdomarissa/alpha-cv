# SonarQube Configuration for Python Backend
sonar.projectKey=alpha-cv-backend
sonar.projectName=Alpha CV Analyzer - Backend (Python/FastAPI)
sonar.projectVersion=2.0.0

# Source code
sonar.sources=app
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Language
sonar.language=py

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.pytest_cache/**,**/venv/**,**/env/**,**/migrations/**,**/tests/**,**/test_*.py,**/*_test.py,**/uploads/**,**/tmp/**,**/temp/**,**/*.log,**/.git/**,**/requirements.txt,**/Dockerfile*

# Test exclusions
sonar.test.exclusions=**/tests/**,**/test_*.py,**/*_test.py,**/conftest.py

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/*_test.py,**/__init__.py,**/migrations/**,**/conftest.py

# Code duplication
sonar.cpd.exclusions=**/tests/**,**/test_*.py,**/*_test.py,**/__init__.py

# Security hotspot settings
sonar.security.hotspots.enabled=true

# Python-specific rules
sonar.python.xunit.reportPath=test-reports/xunit.xml

# Issue exclusions (common false positives)
sonar.issue.ignore.multicriteria=e1,e2,e3,e4
# Too many parameters (acceptable for API routes)
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S107
sonar.issue.ignore.multicriteria.e1.resourceKey=**/routes/*.py
# Too many return statements (acceptable for complex logic)
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S1142
sonar.issue.ignore.multicriteria.e2.resourceKey=**/routes/*.py
# Cognitive complexity (acceptable for business logic)
sonar.issue.ignore.multicriteria.e3.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=**/services/*.py
# Use of eval (if needed for dynamic code)
sonar.issue.ignore.multicriteria.e4.ruleKey=python:S3072
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*.py
